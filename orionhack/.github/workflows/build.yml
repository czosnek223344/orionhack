name: Build OrionHack

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Make gradlew executable
        run: chmod +x ./orionhack/gradlew   # adjust if your gradlew is elsewhere

      - name: Build with Gradle
        working-directory: ./orionhack        # ← Change this if your build files are in a subfolder
        run: ../orionhack/gradlew build --no-daemon   # adjust path if needed

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: orionhack-build
          path: orionhack/build/libs/*.jar
